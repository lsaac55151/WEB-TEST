<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TB 유튜브 채널 포트폴리오</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --accent-color: #c5a059;
            --text-color: #c5c6c7;
            --title-color: #ffffff;
            --card-bg: #151a21;
            --hover-color: #66fcf1;
            --danger-color: #ff4757;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding-bottom: 60px;
        }

        a {
            color: inherit;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        /* Hero Section */
        .hero {
            background: linear-gradient(135deg, #0f0c1b, #200b26, #4d001d);
            padding: 80px 20px;
            text-align: center;
            position: relative;
            border-bottom: 3px solid var(--accent-color);
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, transparent 20%, var(--bg-color) 80%);
            opacity: 0.6;
        }

        .hero-content {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background-color: #2f3542;
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            margin: 0 auto 20px;
            border: 4px solid var(--accent-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .hero h1 {
            font-size: 2.8rem;
            color: var(--title-color);
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .hero .handle {
            font-size: 1.2rem;
            color: var(--accent-color);
            font-weight: 600;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 25px;
            color: #a4b0be;
        }

        .stats-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stat-value {
            font-size: 1.3rem;
            font-weight: bold;
            color: var(--title-color);
        }

        .stat-label {
            font-size: 0.85rem;
            color: #747d8c;
        }

        /* Main Content */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 0 20px;
        }

        section {
            margin-bottom: 60px;
        }

        .section-title {
            font-size: 1.8rem;
            color: var(--title-color);
            margin-bottom: 25px;
            position: relative;
            padding-left: 15px;
            border-left: 4px solid var(--accent-color);
        }

        /* About Section */
        .about-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .about-grid {
                grid-template-columns: 1fr;
            }
        }

        .about-card, .links-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .about-card p {
            margin-bottom: 15px;
        }

        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .tag {
            background: rgba(197, 160, 89, 0.15);
            color: var(--accent-color);
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #222;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 12px;
            font-weight: bold;
            border: 1px solid #333;
        }

        .link-btn.youtube {
            background: #ff4757;
            color: white;
            border: none;
        }

        .link-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Video Section */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .video-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .video-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent-color);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background-color: #1e1e24;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .video-thumbnail::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            transition: background 0.3s ease;
        }

        .video-card:hover .video-thumbnail::before {
            background: rgba(0, 0, 0, 0.1);
        }

        .video-thumbnail::after {
            content: '▶';
            font-size: 2.5rem;
            color: rgba(255,255,255,0.8);
            position: relative;
            z-index: 1;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .video-card:hover .video-thumbnail::after {
            color: var(--accent-color);
            transform: scale(1.1);
        }

        .badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--danger-color);
            color: white;
            padding: 3px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            z-index: 2;
        }

        .video-info {
            padding: 20px;
        }

        .video-title {
            font-size: 1.05rem;
            color: var(--title-color);
            font-weight: bold;
            margin-bottom: 10px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 2.6rem;
            line-height: 1.3;
        }

        .video-meta {
            font-size: 0.85rem;
            color: #747d8c;
            display: flex;
            justify-content: space-between;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            background: #060709;
            color: #4f5b66;
            font-size: 0.9rem;
            border-top: 1px solid #151a21;
        }
    </style>
</head>
<body>

    <header class="hero">
        <div class="hero-content" id="hero-info"></div>
    </header>

    <div class="container">
        <section id="about">
            <h2 class="section-title">크리에이터 소개</h2>
            <div class="about-grid">
                <div class="about-card" id="about-text"></div>
                <div class="links-card" id="channel-links"></div>
            </div>
        </section>

        <section id="portfolio">
            <h2 class="section-title">대표 프로젝트 & 인기 동영상</h2>
            <div class="video-grid" id="video-list"></div>
        </section>
    </div>

    <footer>
        <p>&copy; 2026 TB Portfolio Page. Designed for YouTube Channel Introduction.</p>
    </footer>

                {

                },

        // 데이터를 기반으로 화면을 그리는 렌더링 스크립트
        document.addEventListener("DOMContentLoaded", () => {
            // 상단 프로필 렌더링
            const p = PORTFOLIO_DATA.profile;
            document.getElementById("hero-info").innerHTML = `
                <div class="profile-img" style="background-image: url('${p.profileImg}');" title="${p.name}"></div>
                <h1>${p.name}</h1>
                <div class="handle">${p.handle}</div>
                <p>${p.description}</p>
                <div class="stats-container">
                    <div class="stat-item">
                        <div class="stat-value">${p.subscribers}</div>
                        <div class="stat-label">구독자 수</div>
                    </div>
                    <div class="stat-item">

                    </div>

            // 소개글 및 태그 렌더링
            const a = PORTFOLIO_DATA.about;
            const paragraphsHtml = a.paragraphs.map(txt => `<p>${txt}</p>`).join("");

            document.getElementById("about-text").innerHTML = paragraphsHtml + tagsHtml;

            // 링크 버튼 렌더링
            const linksHtml = `
                <h3 style="color: var(--title-color); margin-bottom: 15px; font-size: 1.1rem;">공식 채널 링크</h3>
                ${PORTFOLIO_DATA.links.map(l => `
                    <a href="${l.url}" target="_blank" class="link-btn ${l.isYoutube ? 'youtube' : ''}">
                        ${l.title}
                    </a>
                `).join("")}
            `;
            document.getElementById("channel-links").innerHTML = linksHtml;

            // 비디오 리스트 렌더링 (유튜브 공식 썸네일 URL을 자동으로 변환 매핑)
            const videoListContainer = document.getElementById("video-list");
            videoListContainer.innerHTML = PORTFOLIO_DATA.videos.map(v => `
                <a href="https://www.youtube.com/watch?v=${v.id}" target="_blank" class="video-card">
                    <div class="video-thumbnail" style="background-image: url('https://img.youtube.com/vi/${v.id}/hqdefault.jpg');">
                        <span class="badge">${v.badge}</span>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${v.title}</div>
                        <div class="video-meta">
                            <span>조회수 ${v.views}</span>
                            <span>${v.date}</span>
                        </div>
                    </div>
                </a>
            `).join("");
        });
    </script>
</body>
</html>
